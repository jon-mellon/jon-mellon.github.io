            function componentToHex(c) {
                var hex = c.toString(16);
                return hex.length == 1 ? "0" + hex : hex;
            }
            function rgbToHex(r, g, b) {
                return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
            }

            updatecol = function (id) {

                let colupdate = document.getElementById(id);
                let currenthex;
                let currentcol = colupdate.style.backgroundColor;
                if (currentcol != "") {
                    currentcol = currentcol.substr(4, 20);
                    let colrgb = currentcol.split(",");
                    colrgb[2] = colrgb[2].replace(")", "");
                    colrgb[2] = colrgb[2].replace(" ", "");
                    currenthex = rgbToHex(parseInt(colrgb[0]), parseInt(colrgb[1]), parseInt(colrgb[2]));
                    currenthex = currenthex.toUpperCase();
                    console.log(currenthex);
                } else {
                    currenthex = "#FFFFFF";
                }
                if (currenthex == playerhitcol.toUpperCase()) {
                    colupdate.style.backgroundColor = "#FFFFFF";
                }
                if (currenthex == "#FFFFFF") {
                    colupdate.style.backgroundColor = "#F0E816";
                }
                if (currenthex == "#F0E816") {
                    colupdate.style.backgroundColor = playerhitcol.toUpperCase();
                }
            }
